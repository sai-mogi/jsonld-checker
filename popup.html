<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { width: 520px; max-height: 600px; overflow-y: auto; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; color: #1a1a1a; background: #f8f9fa; padding: 12px; }
h1 { font-size: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
h1 span { font-size: 18px; }
.block { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
.block-header { padding: 10px 12px; font-weight: 600; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
.block-header:hover { background: #f5f5f5; }
.block-header .arrow { transition: transform 0.2s; font-size: 10px; color: #888; }
.block-header .arrow.open { transform: rotate(90deg); }
.block-body { display: none; border-top: 1px solid #e0e0e0; }
.block-body.open { display: block; }
.status-ok { color: #16a34a; }
.status-warn { color: #d97706; }
.status-err { color: #dc2626; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; color: #fff; }
.badge-ok { background: #16a34a; }
.badge-warn { background: #d97706; }
.badge-err { background: #dc2626; }
.section { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; }
.section:last-child { border-bottom: none; }
.section-title { font-weight: 600; font-size: 12px; color: #555; margin-bottom: 6px; }
.error-msg { background: #fef2f2; color: #dc2626; padding: 8px 10px; border-radius: 4px; font-family: monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; }
.prop-list { list-style: none; }
.prop-list li { padding: 2px 0; font-size: 12px; }
.prop-list li::before { margin-right: 6px; }
.prop-missing::before { content: "\2716"; color: #dc2626; }
.prop-present::before { content: "\2714"; color: #16a34a; }
.prop-recommended::before { content: "\26A0"; color: #d97706; }
.raw-json { background: #f5f5f5; padding: 10px; font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; }
.copy-btn { font-size: 11px; padding: 4px 10px; background: #4f46e5; color: #fff; border: none; border-radius: 4px; cursor: pointer; float: right; }
.copy-btn:hover { background: #4338ca; }
.empty { text-align: center; padding: 30px; color: #888; }
.summary { display: flex; gap: 12px; margin-bottom: 10px; font-size: 12px; }
.summary-item { padding: 6px 12px; background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; }
.btn-group { display: flex; gap: 6px; margin-left: auto; }
.md-btn { font-size: 11px; padding: 6px 10px; background: #1e293b; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; white-space: nowrap; }
.md-btn:hover { opacity: 0.85; }
.md-btn.copied { background: #16a34a !important; }
</style>
</head>
<body>
<h1><span>{ }</span> JSON-LD Checker</h1>
<div id="summary" class="summary"></div>
<div id="results"></div>
<script src="popup.js"></script>
</body>
</html>
